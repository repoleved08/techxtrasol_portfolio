<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <style>
      .tx-bg { fill: url(#gradient); }
      .tx-text { font-family: 'Arial', sans-serif; font-weight: bold; font-size: 140px; fill: white; }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect class="tx-bg" x="0" y="0" width="256" height="256" rx="48"/>
  
  <!-- TX Text -->
  <text class="tx-text" x="128" y="180" text-anchor="middle">TX</text>
  
  <!-- Accent line at bottom -->
  <line x1="40" y1="220" x2="216" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
</svg>
